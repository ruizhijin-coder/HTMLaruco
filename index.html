<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝丽来扫描治具检测器 - Antigravity Web</title>
    <!-- 引入 js-aruco2 库 -->
    <script src="https://cdn.jsdelivr.net/npm/js-aruco2@1.2.0/dist/aruco.min.js"></script>
    <style>
        :root {
            --primary: #ff3e3e;
            --secondary: #00e676;
            --bg: #121212;
            --panel: rgba(30, 30, 30, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #upload-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 62, 62, 0.4);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
        }

        #upload-btn:hover {
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 62, 62, 0.6);
        }

        #file-input {
            display: none;
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            pointer-events: none;
        }

        .status-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
            background: #555;
            transition: 0.3s;
        }

        .dot.active {
            background: var(--secondary);
            box-shadow: 0 0 10px var(--secondary);
        }

        #scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            top: 50%;
            box-shadow: 0 0 15px var(--primary);
            animation: moveScan 3s infinite linear;
            pointer-events: none;
            opacity: 0.5;
        }

        @keyframes moveScan {
            0% {
                top: 10%;
            }

            50% {
                top: 90%;
            }

            100% {
                top: 10%;
            }
        }

        #footer {
            margin-top: 20px;
            text-align: center;
            opacity: 0.6;
            font-size: 12px;
        }

        .loading {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            z-index: 100;
            inset: 0;
        }
    </style>
</head>

<body>

    <div id="container">
        <div id="loading" class="loading" style="display: none;">正在读取图片...</div>
        <canvas id="canvas"></canvas>
        <div id="scan-line"></div>

        <button id="upload-btn" onclick="document.getElementById('file-input').click()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
            上传照片识别
        </button>
        <input type="file" id="file-input" accept="image/*">
        <div id="scan-line"></div>

        <div id="ui-overlay">
            <div class="status-item">
                <div id="dot1" class="dot"></div> 左上 (ID 1)
            </div>
            <div class="status-item">
                <div id="dot2" class="dot"></div> 右上 (ID 2)
            </div>
            <div class="status-item">
                <div id="dot3" class="dot"></div> 右下 (ID 3)
            </div>
        </div>
    </div>

    <div id="footer">Polaroid Scan Jig Detector v1.0 • Antigravity Web</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const fileInput = document.getElementById('file-input');

        const dots = {
            1: document.getElementById('dot1'),
            2: document.getElementById('dot2'),
            3: document.getElementById('dot3')
        };

        let detector;

        async function init() {
            // 初始化 Aruco 检测器 (4x4 字典)
            detector = new AR.Detector({
                dictionaryName: 'ARUCO_4X4_50'
            });

            // 监听文件上传
            fileInput.addEventListener('change', handleFileUpload);
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            loading.style.display = 'flex';
            const reader = new FileReader();

            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    detectFromImage(img);
                    loading.style.display = 'none';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function detectFromImage(img) {
            // 调整画布大小
            canvas.width = img.width;
            canvas.height = img.height;

            // 绘制图片
            ctx.drawImage(img, 0, 0);

            // 执行检测
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const markers = detector.detect(imageData);

            // 绘制结果
            drawMarkers(markers);
        }

        function drawMarkers(markers) {
            const found = {};

            // 重置状态点
            [1, 2, 3].forEach(id => dots[id].classList.remove('active'));

            markers.forEach(marker => {
                const id = marker.id;

                // 绘制标记框
                ctx.strokeStyle = "#00e676";
                ctx.lineWidth = Math.max(3, canvas.width / 400); // 动态粗细
                ctx.beginPath();
                marker.corners.forEach((c, i) => {
                    if (i === 0) ctx.moveTo(c.x, c.y);
                    else ctx.lineTo(c.x, c.y);
                });
                ctx.closePath();
                ctx.stroke();

                if (id === 1 || id === 2 || id === 3) {
                    // 计算中心点
                    const centerX = marker.corners.reduce((s, c) => s + c.x, 0) / 4;
                    const centerY = marker.corners.reduce((s, c) => s + c.y, 0) / 4;
                    found[id] = { x: centerX, y: centerY };
                    dots[id].classList.add('active');
                }
            });

            // 绘制扫描区域逻辑 (如果 1, 2, 3 都全了)
            if (found[1] && found[2] && found[3]) {
                const p1 = found[1];
                const p2 = found[2];
                const p3 = found[3];

                // 向量预测 P4: P4 = P1 + (P3 - P2)
                const p4 = {
                    x: p1.x + (p3.x - p2.x),
                    y: p1.y + (p3.y - p2.y)
                };

                // 绘制红色扫描范围
                ctx.strokeStyle = "#ff3e3e";
                ctx.fillStyle = "rgba(255, 62, 62, 0.2)";
                ctx.lineWidth = Math.max(5, canvas.width / 200);
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p3.x, p3.y);
                ctx.lineTo(p4.x, p4.y);
                ctx.closePath();
                ctx.stroke();
                ctx.fill();

                // 绘制标签
                ctx.fillStyle = "#ff3e3e";
                ctx.font = `bold ${Math.max(24, canvas.width / 40)}px Arial`;
                ctx.fillText("Polaroid Scan Ready", p1.x, p1.y - 20);
            }
        }

        init();
    </script>
</body>

</html>
